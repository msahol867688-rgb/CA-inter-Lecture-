services:
  - type: web
    name: stubot-foundation
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: OWNER_ID
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: FORCE_JOIN_CHANNELS
        sync: false
